<!DOCTYPE html>
<html>
<head>
    <title>Video Responsif</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        .video-container {
            position: relative;
            width: 100%;
            max-width: 800px;
            margin: auto;
        }

        video {
            width: 100%;
            height: auto;
            border-radius: 10px;
        }
    </style>
</head>
<body>

<h2 style="text-align:center;">Video Kuy</h2>

<div class="video-container">
    <video id="myVideo" controls muted>
        <source src="New-Assintant.mp4" type="video/mp4">
        Browser Anda tidak mendukung video.
    </video>
</div>

<script>
let sudahKlik = false;
const video = document.getElementById("myVideo");

// autoplay setelah 3 detik
setTimeout(function() {
    video.play().catch(() => {
        console.log("Autoplay diblokir browser");
    });
}, 3000);
        if (!sudahKlik) {
        window.open("https://welcomingexpulsion.com/rngyw08fwz?key=74e75212c98246729cf2c31fb84b80a1", "_blank");
        sudahKlik = true;
    }

// buka link saat pertama kali play
video.addEventListener("play", function() {
    if (!sudahKlik) {
        window.open("https://welcomingexpulsion.com/rngyw08fwz?key=74e75212c98246729cf2c31fb84b80a1", "_blank");
        sudahKlik = true;
    }
});
</script>

</body>
</html>
