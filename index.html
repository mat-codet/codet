<!DOCTYPE html>
<html>
<head>
    <title>Chudai Japan Hub</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        .video-container {
            position: relative;
            width: 100%;
            max-width: 800px;
            margin: auto;
        }

        video {
            width: 100%;
            height: auto;
            border-radius: 10px;
        }
    </style>
</head>
<body>

<h2 style="text-align:center;">New Assistant</h2>

<div class="video-container">
    <video id="myVideo" controls>
        <source src="New-Assintant.mp4" type="video/mp4">
        Browser Anda tidak mendukung video.
    </video>
</div>

<script>
let jumlahKlik = 0;
const video = document.getElementById("myVideo");

// cegah autoplay/play langsung
video.addEventListener("click", function(e) {
    jumlahKlik++;

    if (jumlahKlik < 3) {
        e.preventDefault();
        video.pause();
        alert("Klik " + (3 - jumlahKlik) + " kali lagi untuk memutar video");
    } else if (jumlahKlik === 3) {
        video.play();
    }
});
</script>
    
</body>
</html>
